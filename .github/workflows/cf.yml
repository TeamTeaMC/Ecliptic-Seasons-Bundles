name: Publish on CurseForge

on:
  workflow_dispatch:

env:
  MINECRAFT_VERSION: 1.20.1,1.21.1
  CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_APITOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: curseforge_apiToken
    steps:
      - name: Check CURSEFORGE_APITOKEN Length
        run: |
          SECRET_LENGTH=$(echo -n "${{ secrets.CURSEFORGE_APITOKEN }}" | wc -m)
          echo "CURSEFORGE_APITOKEN length: $SECRET_LENGTH"
          if [ "$SECRET_LENGTH" -eq 0 ]; then
            echo "CURSEFORGE_APITOKEN is empty!"
            exit 1
          fi

      - name: Check Environment Variables
        run: env

      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          distribution: "temurin"
          java-version: 21

      - name: Make Gradle Wrapper Executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Set Release Name Environment Variable
        id: set_release_name
        run: |
          RELEASE_NAME=$(basename $(ls build/libs/*.jar))
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Publish (CurseForge)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1449802
          curseforge-token: "${{ env.CURSEFORGE_TOKEN }}"
          version-type: release
          changelog-file: changelog.md
          game-versions: |
            1.20.1
            1.21.1
            26.1
            26.1.1
            26.1.2
          loaders: |
            neoforge
            forge
          name: "${{env.RELEASE_NAME}}"
          files: |
            build/libs/${{ env.RELEASE_NAME }}
